version: '3.8'

services:
  claude2gemini:
    build: .
    # 【重要】認証情報の暗号化キーが変わらないように、ホスト名を明示的に固定する
    hostname: claude2gemini
    ports:
      - "8111:8080"
    volumes:
      # 複数アカウントの情報を保存するボリューム
      - gemini-accounts:/app/data
      # 開発時はソースコードをバインドマウントすると便利ですが、必要に応じてコメントアウトを外してください
      # - ./:/app 

volumes:
  gemini-accounts:
